name: Build desktop apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_backend

      - name: Build Rust backend (macOS dylib)
        run: cargo build --release
        working-directory: rust_backend

      - name: Copy dylib into macOS runner bundle
        run: |
          mkdir -p macos/Runner
          cp rust_backend/target/release/librust_sleep_eeg.dylib macos/Runner/

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS app
        run: flutter build macos --release

      - name: Ad-hoc sign macOS app
        run: codesign --force --deep --sign - build/macos/Build/Products/Release/sleep_eeg_desktop.app

      - name: Package macOS app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/sleep_eeg_desktop.app \
            dist/sleep_eeg_desktop-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep_eeg_desktop-macos
          path: dist/sleep_eeg_desktop-macos.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_backend

      - name: Build Rust backend (Windows DLL)
        run: cargo build --release
        working-directory: rust_backend

      - name: Copy DLL into Windows runner
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows\runner
          Copy-Item rust_backend\target\release\rust_sleep_eeg.dll windows\runner\

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath dist\sleep_eeg_desktop-windows.zip `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep_eeg_desktop-windows
          path: dist/sleep_eeg_desktop-windows.zip
          if-no-files-found: error
          retention-days: 7
